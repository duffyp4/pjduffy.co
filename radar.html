    <title>PJ Duffy's Home Page - Radar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-bar {
            padding: 10px 15px;
            background: #CCCCCC;
            border-bottom: 2px solid #999;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 4px 12px;
            background: #DDDDDD;
            border: 2px outset #EEEEEE;
            font-size: 13px;
            font-family: 'Apple Garamond', Georgia, serif;
            cursor: pointer;
            color: #000;
            text-decoration: none;
        }
        .filter-btn:hover {
            background: #C8C8C8;
        }
        .filter-btn.active {
            background: #333;
            color: white;
            border: 2px inset #666;
        }
        .attention-feed {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .attention-card {
            background: white;
        }
        .article-card {
            display: block;
            border: 1px solid #ccc;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 1px 1px 0 #999;
        }
        .article-card:hover {
            box-shadow: 2px 2px 0 #666;
        }
        .og-image img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .article-card-body {
            padding: 10px 12px;
        }
        .article-card-title {
            font-size: 15px;
            font-weight: bold;
            color: #000;
            margin-bottom: 4px;
        }
        .article-card-desc {
            font-size: 13px;
            color: #444;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-card-meta {
            font-size: 12px;
            color: #888;
        }
        .date-separator {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 4px;
            border-bottom: 1px solid #ccc;
            font-family: 'Apple Garamond', Georgia, serif;
        }
        .pagination {
            padding: 12px 15px;
            background: #CCCCCC;
            border-top: 2px solid #999;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            font-family: 'Apple Garamond', Georgia, serif;
            font-size: 13px;
        }
        .page-btn {
            padding: 3px 10px;
            background: #DDDDDD;
            border: 2px outset #EEEEEE;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Apple Garamond', Georgia, serif;
        }
        .page-btn.active {
            background: #333;
            color: white;
            border: 2px inset #666;
        }
        .page-info {
            color: #444;
        }
        .hidden { display: none !important; }
    </style>

    <script>
    (function() {
        var ITEMS_PER_PAGE = 20;
        var cards = Array.from(document.querySelectorAll('.attention-card'));
        var filterBtns = document.querySelectorAll('.filter-btn');
        var pagination = document.getElementById('pagination');
        var currentFilter = 'all';
        var currentPage = 1;

        function getFiltered() {
            if (currentFilter === 'all') return cards;
            return cards.filter(function(c) { return c.dataset.type === currentFilter; });
        }

        function render() {
            var filtered = getFiltered();
            var totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
            if (currentPage > totalPages) currentPage = totalPages;

            var start = (currentPage - 1) * ITEMS_PER_PAGE;
            var end = start + ITEMS_PER_PAGE;

            cards.forEach(function(c) { c.classList.add('hidden'); });
            filtered.slice(start, end).forEach(function(c) { c.classList.remove('hidden'); });

            while (pagination.firstChild) pagination.removeChild(pagination.firstChild);
            if (totalPages > 1) {
                var prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn';
                prevBtn.textContent = '← Prev';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = function() { if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); } };
                pagination.appendChild(prevBtn);

                var info = document.createElement('span');
                info.className = 'page-info';
                info.textContent = 'Page ' + currentPage + ' of ' + totalPages;
                pagination.appendChild(info);

                var nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.textContent = 'Next →';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = function() { if (currentPage < totalPages) { currentPage++; render(); window.scrollTo(0, 0); } };
                pagination.appendChild(nextBtn);
            }

            if (window.twttr && window.twttr.widgets) {
                window.twttr.widgets.load();
            }
        }

        filterBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                filterBtns.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1;
                render();
            });
        });

        render();
    })();
    </script>
</body>
</html>
